<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1b1f2a;
      --accent: #4dd4ff;
      --text: #ffffff;
      --muted: #9aa4b2;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .pad {
      position: fixed;
      inset: 0;
      background: #121826;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      z-index: 1;
    }

    .pad.armed {
      background: #0d2030;
    }

    .notice {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      min-height: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      z-index: 2;
      opacity: 0.85;
    }

    .settings-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid #2c3342;
      background: var(--card);
      color: var(--text);
      font-size: 16px;
      z-index: 3;
    }

    .reset-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #2c3342;
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      z-index: 3;
    }

    .settings {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 12, 0.92);
      display: none;
      z-index: 10;
      padding: 16px;
      overflow: auto;
    }

    .settings.open {
      display: block;
    }

    .settings h1 {
      font-size: 20px;
      margin: 0 0 12px 0;
    }

    .inputs {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .inputs input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2c3342;
      background: var(--card);
      color: var(--text);
      font-size: 16px;
    }

    .items-list {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    .items-list b {
      color: var(--text);
    }

    .close-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #2c3342;
      background: var(--card);
      color: var(--text);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="pad" id="pad">Удерживайте 2 сек, затем повторите 1–5 раз</div>
  <button class="reset-btn" id="resetBtn">Сброс</button>
  <button class="settings-btn" id="settingsBtn">⚙</button>
  <div class="notice" id="notice"></div>

  <div class="settings" id="settings">
    <h1>Настройки предметов</h1>
    <div class="inputs" id="inputs"></div>
    <button class="close-btn" id="closeBtn">Закрыть</button>
    <div class="items-list" id="itemsList"></div>
  </div>

  <script>
    const DEFAULT_ITEMS = ["Чашка", "Ключи", "Телефон", "Ручка", "Монета"];
    const STORAGE_KEY = 'magic-items';

    const inputsEl = document.getElementById('inputs');
    const padEl = document.getElementById('pad');
    const noticeEl = document.getElementById('notice');
    const itemsListEl = document.getElementById('itemsList');
    const settingsEl = document.getElementById('settings');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeBtn = document.getElementById('closeBtn');
    const resetBtn = document.getElementById('resetBtn');

    function getAdminSlug() {
      const path = window.location.pathname;
      if (path.startsWith('/a/')) {
        const parts = path.split('/').filter(Boolean);
        return parts[1] || 'default';
      }
      return 'default';
    }

    const adminSlug = getAdminSlug();

    function loadLocalItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length === 5) return parsed;
      } catch (err) {
        // Если данные битые — используем дефолт
      }
      return null;
    }

    function saveLocalItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    async function fetchServerItems() {
      try {
        const res = await fetch(`/api/a/${adminSlug}/getItems`, { cache: 'no-store' });
        if (!res.ok) throw new Error('Ошибка сервера');
        const data = await res.json();
        if (Array.isArray(data.items) && data.items.length === 5) return data.items;
      } catch (err) {
        // Игнорируем
      }
      return null;
    }

    let saveTimer = null;
    function syncItemsToServer(items) {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          await fetch(`/api/a/${adminSlug}/setItems`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items })
          });
        } catch (err) {
          // Если сеть упала — не критично
        }
      }, 400);
    }

    function renderItems(items) {
      inputsEl.innerHTML = '';

      items.forEach((name, index) => {
        const input = document.createElement('input');
        input.value = name;
        input.placeholder = `Предмет ${index + 1}`;
        input.addEventListener('input', () => {
          items[index] = input.value.trim() || DEFAULT_ITEMS[index];
          saveLocalItems(items);
          syncItemsToServer(items);
          updateItemsList(items);
        });
        inputsEl.appendChild(input);
      });

      updateItemsList(items);
    }

    function updateItemsList(items) {
      itemsListEl.innerHTML = `1: <b>${items[0]}</b> · 2: <b>${items[1]}</b> · 3: <b>${items[2]}</b> · 4: <b>${items[3]}</b> · 5: <b>${items[4]}</b>`;
    }

    let noticeTimer = null;
    function showNotice(text) {
      noticeEl.textContent = text;
      if (noticeTimer) clearTimeout(noticeTimer);
      noticeTimer = setTimeout(() => {
        noticeEl.textContent = '';
      }, 1500);
    }

    // Логика ввода долгими нажатиями
    const LONG_PRESS_MS = 2000;
    const MAX_GAP_MS = 5000;

    let pressTimer = null;
    let finalizeTimer = null;
    let tapCount = 0;
    let isDown = false;
    let countedThisPress = false;

    function resetSequence(msg) {
      tapCount = 0;
      countedThisPress = false;
      padEl.classList.remove('armed');
      if (pressTimer) clearTimeout(pressTimer);
      if (finalizeTimer) clearTimeout(finalizeTimer);
      if (msg) showNotice(msg);
    }

    async function sendCommand(count) {
      try {
        const res = await fetch(`/api/a/${adminSlug}/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item: count })
        });
        if (!res.ok) throw new Error('Ошибка сервера');
        showNotice(`Отправлено: ${count}`);
      } catch (err) {
        showNotice('Ошибка отправки');
      }
    }

    function finalizeSequence() {
      if (tapCount <= 0) return;
      const count = Math.max(1, Math.min(5, tapCount));
      resetSequence();
      sendCommand(count);
    }

    padEl.addEventListener('pointerdown', () => {
      if (settingsEl.classList.contains('open')) return;
      if (isDown) return;
      isDown = true;
      countedThisPress = false;
      padEl.classList.add('armed');

      pressTimer = setTimeout(() => {
        if (!isDown || countedThisPress) return;
        countedThisPress = true;
        tapCount += 1;
        if (tapCount > 5) tapCount = 5;
        showNotice(`Долгих нажатий: ${tapCount}`);

        if (finalizeTimer) clearTimeout(finalizeTimer);
        finalizeTimer = setTimeout(finalizeSequence, MAX_GAP_MS);
      }, LONG_PRESS_MS);
    });

    padEl.addEventListener('pointerup', () => {
      isDown = false;
      if (pressTimer) clearTimeout(pressTimer);
    });

    padEl.addEventListener('pointerleave', () => {
      isDown = false;
      if (pressTimer) clearTimeout(pressTimer);
    });

    settingsBtn.addEventListener('click', () => {
      settingsEl.classList.add('open');
      showNotice('Открыты настройки');
    });

    closeBtn.addEventListener('click', () => {
      settingsEl.classList.remove('open');
      showNotice('Настройки закрыты');
    });

    resetBtn.addEventListener('click', async () => {
      try {
        const res = await fetch(`/api/a/${adminSlug}/reset`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка сервера');
        showNotice('Сброс выполнен');
      } catch (err) {
        showNotice('Ошибка сброса');
      }
    });

    async function initItems() {
      const local = loadLocalItems();
      const server = await fetchServerItems();

      let items = DEFAULT_ITEMS;
      if (server) {
        items = server;
        saveLocalItems(items);
      } else if (local) {
        items = local;
        syncItemsToServer(items);
      }

      renderItems([...items]);
    }

    initItems();
  </script>
</body>
</html>
