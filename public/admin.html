<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Импульс — Админ</title>
  <style>
    @font-face {
      font-family: 'Open Sans Local';
      src: url('/fonts/OpenSans.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Open Sans Local';
      src: url('/fonts/OpenSans.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --panel: #000000;
      --panel-2: #000000;
      --text: #ffffff;
      --muted: #d0d0d0;
      --line: #ffffff;
      --glow: rgba(255, 255, 255, 0.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000000;
      color: var(--text);
      font-family: "Open Sans Local", "Open Sans", "Segoe UI", Tahoma, sans-serif;
      height: 100vh;
      overflow: hidden;
      letter-spacing: 0.2px;
    }
    button, input { transition: all 160ms ease; }

    .pad {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      z-index: 1;
    }

    .pad.armed {
      box-shadow: inset 0 0 0 1px var(--glow), inset 0 0 24px rgba(198, 163, 106, 0.12);
      background: #000000;
    }

    .notice {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 14px;
      min-height: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      z-index: 2;
      opacity: 0.85;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 48px;
      transform: translateX(-50%);
      background: #000000;
      color: #ffffff;
      border: 1px solid #ffffff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      z-index: 4;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }

    .settings-btn,
    .reset-btn,
    .back-btn {
      border: 1px solid var(--line);
      background: #000000;
      color: var(--text);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      cursor: pointer;
    }
    .settings-btn:hover,
    .reset-btn:hover,
    .back-btn:hover { transform: translateY(-1px); }
    .settings-btn:active,
    .reset-btn:active,
    .back-btn:active { transform: translateY(0); }

    .settings-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      font-size: 16px;
      z-index: 3;
    }

    .reset-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      z-index: 3;
    }

    .settings {
      position: fixed;
      inset: 0;
      background: #000000;
      display: none;
      z-index: 10;
      padding: 18px;
      overflow: auto;
    }

    .settings.open { display: block; }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      font-size: 16px;
    }

    .settings h1 {
      font-family: "Open Sans", "Segoe UI", Tahoma, sans-serif;
      font-weight: 700;
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.6px;
    }

    .settings-tabs {
      display: flex;
      gap: 8px;
      margin: 10px 0 12px 0;
    }

    .settings-tab {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      position: relative;
    }

    .settings-tab.active {
      background: #000000;
      border-color: #ffffff;
      box-shadow: inset 0 0 0 1px #ffffff;
    }
    .settings-tab.active::after {
      content: "";
      position: absolute;
      inset: 0;
      background: #ffffff;
      opacity: 0.08;
      border-radius: 12px;
      pointer-events: none;
    }

    .inputs {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .toggle-group {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .toggle-option {
      display: block;
      position: relative;
    }

    .toggle-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-option span {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #ffffff;
      background: #000000;
      color: #ffffff;
      font-size: 13px;
      transition: all 160ms ease;
    }

    .toggle-option input:checked + span {
      background: #ffffff;
      color: #000000;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 8px;
      align-items: center;
    }

    .item-row input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #000000;
      color: var(--text);
      font-size: 15px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      outline: none;
    }
    .item-row input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
    }

    .delete-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #000000;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
    }

    .add-btn {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .add-btn:hover { border-color: #ffffff; color: var(--text); }

    .items-list {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .items-list b { color: var(--text); }

    .template-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel-2);
      margin-bottom: 8px;
    }

    .template-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .template-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }

    .template-btn {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #000000;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }

    body.settings-open .pad { pointer-events: none; }
  </style>
</head>
<body>
  <div class="pad" id="pad">Удерживайте экран 2 секунда, затем тапните нужное количество раз</div>
  <button class="reset-btn" id="resetBtn">Сброс</button>
  <button class="settings-btn" id="settingsBtn">⚙</button>
  <div class="notice" id="notice"></div>
  <div class="toast" id="toast"></div>

  <div class="settings" id="settings">
    <div class="settings-header">
      <button class="back-btn" id="backBtn">←</button>
      <h1>Настройка Импульса</h1>
    </div>
    <div class="settings-tabs">
      <button class="settings-tab active" id="tabItems">Предметы</button>
      <button class="settings-tab" id="tabTemplates">Шаблоны</button>
    </div>

    <div id="itemsView">
      <div class="inputs" id="inputs"></div>
      <button class="add-btn" id="addBtn">＋</button>
      <button class="add-btn" id="saveTemplateBtn">Сохранить как шаблон</button>
      <div class="items-list" id="itemsList"></div>

      <div class="items-list" style="margin-top:16px;">Способ активации</div>
      <div class="toggle-group" id="activationSettings">
        <label class="toggle-option">
          <input type="radio" name="activationMode" value="hold" />
          <span>Удержание &gt; 2 секунд</span>
        </label>
        <label class="toggle-option">
          <input type="radio" name="activationMode" value="double" />
          <span>Два коротких тапа &lt; 1 секунды</span>
        </label>
      </div>
    </div>

    <div id="templatesView" style="display:none;">
      <div class="items-list">Хранится до 10 шаблонов</div>
      <div id="templatesList"></div>
    </div>
  </div>

  <script>
    const DEFAULT_ITEMS = ["Чашка", "Ключи", "Телефон", "Ручка", "Монета"];
    const STORAGE_KEY = 'magic-items';
    const TEMPLATES_KEY = 'magic-templates';
    const MAX_ITEMS = 20;
    const MAX_TEMPLATES = 10;

    const inputsEl = document.getElementById('inputs');
    const padEl = document.getElementById('pad');
    const noticeEl = document.getElementById('notice');
    const toastEl = document.getElementById('toast');
    const itemsListEl = document.getElementById('itemsList');
    const settingsEl = document.getElementById('settings');
    const settingsBtn = document.getElementById('settingsBtn');
    const backBtn = document.getElementById('backBtn');
    const resetBtn = document.getElementById('resetBtn');
    const addBtn = document.getElementById('addBtn');
    const saveTemplateBtn = document.getElementById('saveTemplateBtn');
    const templatesListEl = document.getElementById('templatesList');
    const tabItems = document.getElementById('tabItems');
    const tabTemplates = document.getElementById('tabTemplates');
    const itemsView = document.getElementById('itemsView');
    const templatesView = document.getElementById('templatesView');
    const activationSettingsEl = document.getElementById('activationSettings');

    let currentItems = [...DEFAULT_ITEMS];
    const activationKey = `impulse-activation-${getAdminSlug()}`;

    function getAdminSlug() {
      const path = window.location.pathname;
      if (path.startsWith('/a/')) {
        const parts = path.split('/').filter(Boolean);
        return parts[1] || 'default';
      }
      return 'default';
    }

    const adminSlug = getAdminSlug();

    function getActivationMode() {
      const saved = localStorage.getItem(activationKey);
      return saved === 'double' ? 'double' : 'hold';
    }

    function setActivationMode(mode) {
      localStorage.setItem(activationKey, mode);
      updateActivationUI(mode);
    }

    function updateActivationUI(mode) {
      const radios = activationSettingsEl.querySelectorAll('input[name=\"activationMode\"]');
      radios.forEach(r => {
        r.checked = r.value === mode;
      });
      if (mode === 'double') {
        padEl.textContent = 'Дважды быстро нажмите на экран, затем тапните нужное количество раз';
      } else {
        padEl.textContent = 'Удерживайте экран 2 секунды, затем тапните нужное количество раз';
      }
    }

    function loadLocalItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length >= 1) return parsed;
      } catch (err) {
      }
      return null;
    }

    function loadTemplates() {
      try {
        const saved = localStorage.getItem(TEMPLATES_KEY);
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) return parsed;
      } catch (err) {
      }
      return [];
    }

    function saveTemplates(list) {
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(list.slice(0, MAX_TEMPLATES)));
    }

    function saveLocalItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    async function fetchServerItems() {
      try {
        const res = await fetch(`/api/a/${adminSlug}/getItems`, { cache: 'no-store' });
        if (!res.ok) throw new Error('Ошибка сервера');
        const data = await res.json();
        if (Array.isArray(data.items) && data.items.length >= 1) return data.items;
      } catch (err) {
      }
      return null;
    }

    let saveTimer = null;
    function syncItemsToServer(items) {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          await fetch(`/api/a/${adminSlug}/setItems`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items })
          });
        } catch (err) {
        }
      }, 400);
    }

    function renderItems(items) {
      inputsEl.innerHTML = '';
      currentItems = [...items];

      items.forEach((name, index) => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.setAttribute('draggable', 'true');
        row.dataset.index = String(index);

        const input = document.createElement('input');
        input.value = name;
        input.placeholder = `Предмет ${index + 1}`;
        input.addEventListener('input', () => {
          currentItems[index] = input.value.trim() || `Предмет ${index + 1}`;
          saveLocalItems(currentItems);
          syncItemsToServer(currentItems);
          updateItemsList(currentItems);
        });
        row.appendChild(input);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          if (currentItems.length <= 1) return;
          currentItems.splice(index, 1);
          saveLocalItems(currentItems);
          syncItemsToServer(currentItems);
          renderItems(currentItems);
        });
        row.appendChild(del);

        inputsEl.appendChild(row);
      });

      updateItemsList(items);
      addBtn.style.display = currentItems.length >= MAX_ITEMS ? 'none' : 'block';
    }

    function updateItemsList(items) {
      const preview = items.map((v, i) => `${i + 1}: <b>${v}</b>`).join(' · ');
      itemsListEl.innerHTML = preview;
    }

    function renderTemplates() {
      const list = loadTemplates();
      templatesListEl.innerHTML = '';

      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'items-list';
        empty.textContent = 'Шаблонов пока нет';
        templatesListEl.appendChild(empty);
        return;
      }

      list.forEach((t, idx) => {
        const card = document.createElement('div');
        card.className = 'template-card';

        const title = document.createElement('div');
        title.className = 'template-title';
        title.textContent = `Шаблон ${idx + 1}`;

        const preview = document.createElement('div');
        preview.className = 'items-list';
        preview.textContent = t.items.map((v, i) => `${i + 1}. ${v}`).join(' · ');

        const actions = document.createElement('div');
        actions.className = 'template-actions';

        const applyBtn = document.createElement('button');
        applyBtn.className = 'template-btn';
        applyBtn.textContent = 'Применить';
        applyBtn.dataset.apply = String(idx);

        const delBtn = document.createElement('button');
        delBtn.className = 'template-btn';
        delBtn.textContent = 'Удалить';
        delBtn.dataset.delete = String(idx);

        actions.appendChild(applyBtn);
        actions.appendChild(delBtn);

        card.appendChild(title);
        card.appendChild(preview);
        card.appendChild(actions);
        templatesListEl.appendChild(card);
      });
    }

    let noticeTimer = null;
    function showNotice(text) {
      noticeEl.textContent = text;
      if (noticeTimer) clearTimeout(noticeTimer);
      noticeTimer = setTimeout(() => {
        noticeEl.textContent = '';
      }, 1500);
    }

    let toastTimer = null;
    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 1200);
    }

    // Логика: удержание 2 сек или двойной тап для активации, затем тапы с интервалом <= 2.5 сек
    const ACTIVATE_HOLD_MS = 2000;
    const TAP_GAP_MS = 2500;
    const DOUBLE_TAP_MS = 1000;

    let holdTimer = null;
    let tapTimer = null;
    let tapCount = 0;
    let isDown = false;
    let armed = false;
    let ignoreNextTap = false;
    let lastTapTs = 0;
    let lastActivationTapTs = 0;
    let usingTouch = false;
    let lastTouchTs = 0;
    let activationMode = getActivationMode();

    function resetSequence(msg) {
      tapCount = 0;
      armed = false;
      padEl.classList.remove('armed');
      if (holdTimer) clearTimeout(holdTimer);
      if (tapTimer) clearTimeout(tapTimer);
      if (msg) showNotice(msg);
    }

    async function sendCommand(count) {
      showNotice('Отправляю...');
      const ok = await sendWithRetry(count);
      if (ok) showNotice(`Отправлено: ${count}`);
      else showNotice('Ошибка сети, попробуйте ещё раз');
    }

    async function sendWithRetry(count) {
      if (await trySend(count, 12000)) return true;
      await new Promise(r => setTimeout(r, 800));
      return trySend(count, 12000);
    }

    async function trySend(count, timeoutMs) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(`/api/a/${adminSlug}/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item: count }),
          cache: 'no-store',
          keepalive: true,
          signal: controller.signal
        });
        return res.ok;
      } catch (err) {
        return false;
      } finally {
        clearTimeout(id);
      }
    }

    function finalizeSequence() {
      if (tapCount <= 0) return;
      const max = Math.max(1, currentItems.length || 1);
      const count = Math.max(1, Math.min(max, tapCount));
      resetSequence();
      sendCommand(count);
    }

    padEl.addEventListener('pointerdown', () => {
      if (settingsEl.classList.contains('open')) return;
      if (isDown) return;
      isDown = true;

      if (!armed && activationMode === 'hold') {
        holdTimer = setTimeout(() => {
          if (!isDown) return;
          armed = true;
          ignoreNextTap = true; // игнорируем отпускание после удержания
          padEl.classList.add('armed');
          showNotice('Активировано. Тапните 1–N раз');
        }, ACTIVATE_HOLD_MS);
      }
    });

    function handleTapEvent(source) {
      const now = Date.now();
      if (source === 'pointer' && usingTouch && now - lastTouchTs < 500) return;
      if (now - lastTapTs < 120) return; // защита от дублей
      lastTapTs = now;

      if (settingsEl.classList.contains('open')) return;
      if (!armed) {
        if (activationMode === 'double') {
          if (now - lastActivationTapTs <= DOUBLE_TAP_MS) {
            armed = true;
            lastActivationTapTs = 0;
            padEl.classList.add('armed');
            showNotice('Активировано. Тапните 1–N раз');
          } else {
            lastActivationTapTs = now;
            showNotice('Ещё один тап для активации');
          }
        }
        return;
      }
      if (ignoreNextTap) {
        ignoreNextTap = false;
        return;
      }

      const max = Math.max(1, currentItems.length || 1);
      if (tapCount < max) {
        tapCount += 1;
      }

      showNotice(`Тапов: ${tapCount}`);

      if (tapCount >= max) {
        finalizeSequence();
        return;
      }
      if (tapTimer) clearTimeout(tapTimer);
      tapTimer = setTimeout(finalizeSequence, TAP_GAP_MS);
    }

    padEl.addEventListener('pointerup', () => {
      isDown = false;
      if (holdTimer) clearTimeout(holdTimer);
      handleTapEvent('pointer');
    });

    padEl.addEventListener('pointerleave', () => {
      isDown = false;
      if (holdTimer) clearTimeout(holdTimer);
    });

    // Надёжный fallback для iOS (touch-события)
    padEl.addEventListener('touchstart', () => {
      usingTouch = true;
      lastTouchTs = Date.now();
    }, { passive: true });

    padEl.addEventListener('touchend', (e) => {
      e.preventDefault();
      isDown = false;
      if (holdTimer) clearTimeout(holdTimer);
      lastTouchTs = Date.now();
      handleTapEvent('touch');
    }, { passive: false });


    settingsBtn.addEventListener('click', () => {
      settingsEl.classList.add('open');
      document.body.classList.add('settings-open');
      showNotice('Открыты настройки');
      showToast('Настройки');
    });

    backBtn.addEventListener('click', () => {
      settingsEl.classList.remove('open');
      document.body.classList.remove('settings-open');
      showNotice('Настройки закрыты');
      showToast('Возврат');
    });

    resetBtn.addEventListener('click', async () => {
      try {
        const res = await fetch(`/api/a/${adminSlug}/reset`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка сервера');
        showNotice('Сброс выполнен');
      } catch (err) {
        showNotice('Ошибка сброса');
      }
    });

    addBtn.addEventListener('click', () => {
      if (currentItems.length >= MAX_ITEMS) return;
      currentItems.push(`Предмет ${currentItems.length + 1}`);
      saveLocalItems(currentItems);
      syncItemsToServer(currentItems);
      renderItems(currentItems);
    });

    saveTemplateBtn.addEventListener('click', () => {
      const list = loadTemplates();
      if (list.length >= MAX_TEMPLATES) {
        showNotice('Лимит шаблонов: 10');
        showToast('Лимит шаблонов');
        return;
      }
      list.unshift({ items: [...currentItems] });
      saveTemplates(list);
      renderTemplates();
      showNotice('Шаблон сохранён');
      showToast('Шаблон сохранён');
    });

    templatesListEl.addEventListener('click', (e) => {
      const applyBtn = e.target.closest('[data-apply]');
      const delBtn = e.target.closest('[data-delete]');
      const list = loadTemplates();
      if (applyBtn) {
        const idx = Number(applyBtn.getAttribute('data-apply'));
        if (!Number.isInteger(idx) || !list[idx]) return;
        const items = list[idx].items.slice(0, MAX_ITEMS);
        currentItems = items.length ? items : ['Предмет 1'];
        saveLocalItems(currentItems);
        syncItemsToServer(currentItems);
        renderItems(currentItems);
        showNotice('Шаблон применён');
        showToast('Шаблон применён');
      }
      if (delBtn) {
        const idx = Number(delBtn.getAttribute('data-delete'));
        if (!Number.isInteger(idx) || !list[idx]) return;
        list.splice(idx, 1);
        saveTemplates(list);
        renderTemplates();
        showNotice('Шаблон удалён');
        showToast('Шаблон удалён');
      }
    });

    tabItems.addEventListener('click', () => {
      tabItems.classList.add('active');
      tabTemplates.classList.remove('active');
      itemsView.style.display = 'block';
      templatesView.style.display = 'none';
      showToast('Предметы');
    });

    tabTemplates.addEventListener('click', () => {
      tabTemplates.classList.add('active');
      tabItems.classList.remove('active');
      itemsView.style.display = 'none';
      templatesView.style.display = 'block';
      renderTemplates();
      showToast('Шаблоны');
    });

    activationSettingsEl.addEventListener('change', (e) => {
      const target = e.target;
      if (target && target.name === 'activationMode') {
        activationMode = target.value === 'double' ? 'double' : 'hold';
        setActivationMode(activationMode);
        showToast('Настройка сохранена');
      }
    });

    let dragIndex = null;
    inputsEl.addEventListener('dragstart', (e) => {
      const row = e.target.closest('.item-row');
      if (!row) return;
      dragIndex = Number(row.dataset.index);
      e.dataTransfer.effectAllowed = 'move';
    });

    inputsEl.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    inputsEl.addEventListener('drop', (e) => {
      e.preventDefault();
      const row = e.target.closest('.item-row');
      if (!row || dragIndex === null) return;
      const dropIndex = Number(row.dataset.index);
      if (Number.isInteger(dragIndex) && Number.isInteger(dropIndex) && dragIndex !== dropIndex) {
        const next = [...currentItems];
        const [moved] = next.splice(dragIndex, 1);
        next.splice(dropIndex, 0, moved);
        currentItems = next;
        saveLocalItems(currentItems);
        syncItemsToServer(currentItems);
        renderItems(currentItems);
      }
      dragIndex = null;
    });

    async function initItems() {
      const local = loadLocalItems();
      const server = await fetchServerItems();

      let items = DEFAULT_ITEMS;
      if (server) {
        items = server;
        saveLocalItems(items);
      } else if (local) {
        items = local;
        syncItemsToServer(items);
      }

      renderItems([...items]);
      updateActivationUI(activationMode);
    }

    initItems();
  </script>
</body>
</html>
