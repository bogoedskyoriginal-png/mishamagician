<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тишина — Админ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600&display=swap');
    :root {
      --bg: #0f0c0b;
      --panel: rgba(24, 19, 17, 0.92);
      --panel-2: rgba(31, 24, 22, 0.9);
      --accent: #c6a36a;
      --accent-2: #7bbca3;
      --text: #f4f1eb;
      --muted: #b0a79b;
      --line: rgba(198, 163, 106, 0.22);
      --glow: rgba(198, 163, 106, 0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(1000px 520px at 80% -20%, #2b211c 0%, transparent 60%),
        radial-gradient(900px 520px at 0% 110%, #261d1a 0%, transparent 60%),
        #0f0c0b;
      color: var(--text);
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      height: 100vh;
      overflow: hidden;
      letter-spacing: 0.2px;
    }
    button, input { transition: all 160ms ease; }

    .pad {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(26, 20, 18, 0.98) 0%, rgba(12, 10, 9, 0.98) 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      z-index: 1;
    }

    .pad.armed {
      box-shadow: inset 0 0 0 1px var(--glow), inset 0 0 24px rgba(198, 163, 106, 0.12);
      background: linear-gradient(160deg, rgba(36, 28, 24, 0.98) 0%, rgba(12, 10, 9, 0.98) 60%);
    }

    .notice {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 14px;
      min-height: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      z-index: 2;
      opacity: 0.85;
    }

    .settings-btn,
    .reset-btn,
    .back-btn {
      border: 1px solid var(--line);
      background: rgba(22, 17, 15, 0.9);
      color: var(--text);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      cursor: pointer;
    }
    .settings-btn:hover,
    .reset-btn:hover,
    .back-btn:hover { transform: translateY(-1px); }
    .settings-btn:active,
    .reset-btn:active,
    .back-btn:active { transform: translateY(0); }

    .settings-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      font-size: 16px;
      z-index: 3;
    }

    .reset-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      z-index: 3;
    }

    .settings {
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 7, 0.95);
      display: none;
      z-index: 10;
      padding: 18px;
      overflow: auto;
    }

    .settings.open { display: block; }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      font-size: 16px;
    }

    .settings h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.6px;
    }

    .settings-tabs {
      display: flex;
      gap: 8px;
      margin: 10px 0 12px 0;
    }

    .settings-tab {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    .settings-tab.active {
      background: #2a201b;
      border-color: rgba(198, 163, 106, 0.45);
      box-shadow: inset 0 0 0 1px rgba(198, 163, 106, 0.18);
    }

    .inputs {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 8px;
      align-items: center;
    }

    .item-row input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font-size: 15px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      outline: none;
    }
    .item-row input:focus {
      border-color: rgba(198, 163, 106, 0.55);
      box-shadow: 0 0 0 3px rgba(198, 163, 106, 0.15);
    }

    .delete-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(24, 18, 16, 0.7);
      color: #ffb3b3;
      font-size: 18px;
      cursor: pointer;
    }

    .add-btn {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .add-btn:hover { border-color: rgba(198, 163, 106, 0.55); color: var(--text); }

    .items-list {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .items-list b { color: var(--text); }

    .template-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel-2);
      margin-bottom: 8px;
    }

    .template-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .template-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }

    .template-btn {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #2a201b;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }

    body.settings-open .pad { pointer-events: none; }
  </style>
</head>
<body>
  <div class="pad" id="pad">Удерживайте 2 сек, затем тапните 1–5 раз</div>
  <button class="reset-btn" id="resetBtn">Сброс</button>
  <button class="settings-btn" id="settingsBtn">⚙</button>
  <div class="notice" id="notice"></div>

  <div class="settings" id="settings">
    <div class="settings-header">
      <button class="back-btn" id="backBtn">←</button>
      <h1>Предметы</h1>
    </div>
    <div class="settings-tabs">
      <button class="settings-tab active" id="tabItems">Предметы</button>
      <button class="settings-tab" id="tabTemplates">Шаблоны</button>
    </div>

    <div id="itemsView">
      <div class="inputs" id="inputs"></div>
      <button class="add-btn" id="addBtn">＋</button>
      <button class="add-btn" id="saveTemplateBtn">Сохранить как шаблон</button>
      <div class="items-list" id="itemsList"></div>
    </div>

    <div id="templatesView" style="display:none;">
      <div class="items-list">Хранится до 10 шаблонов</div>
      <div id="templatesList"></div>
    </div>
  </div>

  <script>
    const DEFAULT_ITEMS = ["Чашка", "Ключи", "Телефон", "Ручка", "Монета"];
    const STORAGE_KEY = 'magic-items';
    const TEMPLATES_KEY = 'magic-templates';
    const MAX_ITEMS = 20;
    const MAX_TEMPLATES = 10;

    const inputsEl = document.getElementById('inputs');
    const padEl = document.getElementById('pad');
    const noticeEl = document.getElementById('notice');
    const itemsListEl = document.getElementById('itemsList');
    const settingsEl = document.getElementById('settings');
    const settingsBtn = document.getElementById('settingsBtn');
    const backBtn = document.getElementById('backBtn');
    const resetBtn = document.getElementById('resetBtn');
    const addBtn = document.getElementById('addBtn');
    const saveTemplateBtn = document.getElementById('saveTemplateBtn');
    const templatesListEl = document.getElementById('templatesList');
    const tabItems = document.getElementById('tabItems');
    const tabTemplates = document.getElementById('tabTemplates');
    const itemsView = document.getElementById('itemsView');
    const templatesView = document.getElementById('templatesView');

    let currentItems = [...DEFAULT_ITEMS];

    function getAdminSlug() {
      const path = window.location.pathname;
      if (path.startsWith('/a/')) {
        const parts = path.split('/').filter(Boolean);
        return parts[1] || 'default';
      }
      return 'default';
    }

    const adminSlug = getAdminSlug();

    function loadLocalItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length >= 1) return parsed;
      } catch (err) {
        // ignore
      }
      return null;
    }

    function loadTemplates() {
      try {
        const saved = localStorage.getItem(TEMPLATES_KEY);
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) return parsed;
      } catch (err) {
        // ignore
      }
      return [];
    }

    function saveTemplates(list) {
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(list.slice(0, MAX_TEMPLATES)));
    }

    function saveLocalItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    async function fetchServerItems() {
      try {
        const res = await fetch(`/api/a/${adminSlug}/getItems`, { cache: 'no-store' });
        if (!res.ok) throw new Error('Ошибка сервера');
        const data = await res.json();
        if (Array.isArray(data.items) && data.items.length >= 1) return data.items;
      } catch (err) {
        // ignore
      }
      return null;
    }

    let saveTimer = null;
    function syncItemsToServer(items) {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          await fetch(`/api/a/${adminSlug}/setItems`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items })
          });
        } catch (err) {
          // ignore
        }
      }, 400);
    }

    function renderItems(items) {
      inputsEl.innerHTML = '';
      currentItems = [...items];

      items.forEach((name, index) => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.setAttribute('draggable', 'true');
        row.dataset.index = String(index);

        const input = document.createElement('input');
        input.value = name;
        input.placeholder = `Предмет ${index + 1}`;
        input.addEventListener('input', () => {
          currentItems[index] = input.value.trim() || `Предмет ${index + 1}`;
          saveLocalItems(currentItems);
          syncItemsToServer(currentItems);
          updateItemsList(currentItems);
        });
        row.appendChild(input);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          if (currentItems.length <= 1) return;
          currentItems.splice(index, 1);
          saveLocalItems(currentItems);
          syncItemsToServer(currentItems);
          renderItems(currentItems);
        });
        row.appendChild(del);

        inputsEl.appendChild(row);
      });

      updateItemsList(items);
      addBtn.style.display = currentItems.length >= MAX_ITEMS ? 'none' : 'block';
    }

    function updateItemsList(items) {
      const preview = items.map((v, i) => `${i + 1}: <b>${v}</b>`).join(' · ');
      itemsListEl.innerHTML = preview;
    }

    function renderTemplates() {
      const list = loadTemplates();
      templatesListEl.innerHTML = '';

      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'items-list';
        empty.textContent = 'Шаблонов пока нет';
        templatesListEl.appendChild(empty);
        return;
      }

      list.forEach((t, idx) => {
        const card = document.createElement('div');
        card.className = 'template-card';

        const title = document.createElement('div');
        title.className = 'template-title';
        title.textContent = `Шаблон ${idx + 1}`;

        const preview = document.createElement('div');
        preview.className = 'items-list';
        preview.textContent = t.items.map((v, i) => `${i + 1}. ${v}`).join(' · ');

        const actions = document.createElement('div');
        actions.className = 'template-actions';

        const applyBtn = document.createElement('button');
        applyBtn.className = 'template-btn';
        applyBtn.textContent = 'Применить';
        applyBtn.dataset.apply = String(idx);

        const delBtn = document.createElement('button');
        delBtn.className = 'template-btn';
        delBtn.textContent = 'Удалить';
        delBtn.dataset.delete = String(idx);

        actions.appendChild(applyBtn);
        actions.appendChild(delBtn);

        card.appendChild(title);
        card.appendChild(preview);
        card.appendChild(actions);
        templatesListEl.appendChild(card);
      });
    }

    let noticeTimer = null;
    function showNotice(text) {
      noticeEl.textContent = text;
      if (noticeTimer) clearTimeout(noticeTimer);
      noticeTimer = setTimeout(() => {
        noticeEl.textContent = '';
      }, 1500);
    }

    // Логика: удержание 2 сек для активации, затем тапы с интервалом <= 1 сек
    const ACTIVATE_HOLD_MS = 2000;
    const TAP_GAP_MS = 1000;

    let holdTimer = null;
    let tapTimer = null;
    let tapCount = 0;
    let isDown = false;
    let armed = false;

    function resetSequence(msg) {
      tapCount = 0;
      armed = false;
      padEl.classList.remove('armed');
      if (holdTimer) clearTimeout(holdTimer);
      if (tapTimer) clearTimeout(tapTimer);
      if (msg) showNotice(msg);
    }

    async function sendCommand(count) {
      try {
        const ok = await trySend(count);
        if (ok) {
          showNotice(`Отправлено: ${count}`);
          return;
        }

        // Повторяем один раз, чтобы убрать ложные ошибки от сети/пробуждения сервера
        await new Promise(r => setTimeout(r, 600));
        const okRetry = await trySend(count);
        if (okRetry) {
          showNotice(`Отправлено: ${count}`);
        } else {
          showNotice('Ошибка отправки');
        }
      } catch (err) {
        showNotice('Ошибка отправки');
      }
    }

    async function trySend(count) {
      const res = await fetch(`/api/a/${adminSlug}/command`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item: count }),
        cache: 'no-store'
      });
      return res.ok;
    }

    function finalizeSequence() {
      if (tapCount <= 0) return;
      const max = Math.max(1, currentItems.length || 1);
      const count = Math.max(1, Math.min(max, tapCount));
      resetSequence();
      sendCommand(count);
    }

    padEl.addEventListener('pointerdown', () => {
      if (settingsEl.classList.contains('open')) return;
      if (isDown) return;
      isDown = true;

      if (!armed) {
        holdTimer = setTimeout(() => {
          if (!isDown) return;
          armed = true;
          padEl.classList.add('armed');
          showNotice('Активировано. Тапните 1–N раз');
        }, ACTIVATE_HOLD_MS);
      }
    });

    padEl.addEventListener('pointerup', () => {
      isDown = false;
      if (holdTimer) clearTimeout(holdTimer);
    });

    padEl.addEventListener('pointerleave', () => {
      isDown = false;
      if (holdTimer) clearTimeout(holdTimer);
    });

    padEl.addEventListener('click', () => {
      if (settingsEl.classList.contains('open')) return;
      if (!armed) return;

      const max = Math.max(1, currentItems.length || 1);
      if (tapCount < max) {
        tapCount += 1;
      }

      showNotice(`Тапов: ${tapCount}`);

      if (tapTimer) clearTimeout(tapTimer);
      tapTimer = setTimeout(finalizeSequence, TAP_GAP_MS);
    });

    settingsBtn.addEventListener('click', () => {
      settingsEl.classList.add('open');
      document.body.classList.add('settings-open');
      showNotice('Открыты настройки');
    });

    backBtn.addEventListener('click', () => {
      settingsEl.classList.remove('open');
      document.body.classList.remove('settings-open');
      showNotice('Настройки закрыты');
    });

    resetBtn.addEventListener('click', async () => {
      try {
        const res = await fetch(`/api/a/${adminSlug}/reset`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка сервера');
        showNotice('Сброс выполнен');
      } catch (err) {
        showNotice('Ошибка сброса');
      }
    });

    addBtn.addEventListener('click', () => {
      if (currentItems.length >= MAX_ITEMS) return;
      currentItems.push(`Предмет ${currentItems.length + 1}`);
      saveLocalItems(currentItems);
      syncItemsToServer(currentItems);
      renderItems(currentItems);
    });

    saveTemplateBtn.addEventListener('click', () => {
      const list = loadTemplates();
      if (list.length >= MAX_TEMPLATES) {
        showNotice('Лимит шаблонов: 10');
        return;
      }
      list.unshift({ items: [...currentItems] });
      saveTemplates(list);
      renderTemplates();
      showNotice('Шаблон сохранён');
    });

    templatesListEl.addEventListener('click', (e) => {
      const applyBtn = e.target.closest('[data-apply]');
      const delBtn = e.target.closest('[data-delete]');
      const list = loadTemplates();
      if (applyBtn) {
        const idx = Number(applyBtn.getAttribute('data-apply'));
        if (!Number.isInteger(idx) || !list[idx]) return;
        const items = list[idx].items.slice(0, MAX_ITEMS);
        currentItems = items.length ? items : ['Предмет 1'];
        saveLocalItems(currentItems);
        syncItemsToServer(currentItems);
        renderItems(currentItems);
        showNotice('Шаблон применён');
      }
      if (delBtn) {
        const idx = Number(delBtn.getAttribute('data-delete'));
        if (!Number.isInteger(idx) || !list[idx]) return;
        list.splice(idx, 1);
        saveTemplates(list);
        renderTemplates();
        showNotice('Шаблон удалён');
      }
    });

    tabItems.addEventListener('click', () => {
      tabItems.classList.add('active');
      tabTemplates.classList.remove('active');
      itemsView.style.display = 'block';
      templatesView.style.display = 'none';
    });

    tabTemplates.addEventListener('click', () => {
      tabTemplates.classList.add('active');
      tabItems.classList.remove('active');
      itemsView.style.display = 'none';
      templatesView.style.display = 'block';
      renderTemplates();
    });

    // Drag & drop сортировка
    let dragIndex = null;
    inputsEl.addEventListener('dragstart', (e) => {
      const row = e.target.closest('.item-row');
      if (!row) return;
      dragIndex = Number(row.dataset.index);
      e.dataTransfer.effectAllowed = 'move';
    });

    inputsEl.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    inputsEl.addEventListener('drop', (e) => {
      e.preventDefault();
      const row = e.target.closest('.item-row');
      if (!row || dragIndex === null) return;
      const dropIndex = Number(row.dataset.index);
      if (Number.isInteger(dragIndex) && Number.isInteger(dropIndex) && dragIndex !== dropIndex) {
        const next = [...currentItems];
        const [moved] = next.splice(dragIndex, 1);
        next.splice(dropIndex, 0, moved);
        currentItems = next;
        saveLocalItems(currentItems);
        syncItemsToServer(currentItems);
        renderItems(currentItems);
      }
      dragIndex = null;
    });

    async function initItems() {
      const local = loadLocalItems();
      const server = await fetchServerItems();

      let items = DEFAULT_ITEMS;
      if (server) {
        items = server;
        saveLocalItems(items);
      } else if (local) {
        items = local;
        syncItemsToServer(items);
      }

      renderItems([...items]);
    }

    initItems();
  </script>
</body>
</html>
