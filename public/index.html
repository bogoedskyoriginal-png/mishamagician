<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Импульс</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Crect width='256' height='256' fill='black'/%3E%3Ctext x='50%25' y='58%25' font-size='140' text-anchor='middle' fill='white' font-family='Arial'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Crect width='256' height='256' fill='black'/%3E%3Ctext x='50%25' y='58%25' font-size='140' text-anchor='middle' fill='white' font-family='Arial'%3EM%3C/text%3E%3C/svg%3E" />
  <style>
    @font-face {
      font-family: 'Open Sans Local';
      src: url('/fonts/OpenSans.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Open Sans Local';
      src: url('/fonts/OpenSans.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      color: #ffffff;
      font-family: "Open Sans Local", "Open Sans", "Segoe UI", Tahoma, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap {
      padding: 24px;
    }
    .status {
      font-size: 22px;
      margin-bottom: 12px;
      letter-spacing: 0.4px;
    }
    .error {
      font-size: 14px;
      color: #ffffff;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="status">Ожидание предсказания...</div>
    <div id="error" class="error"></div>
  </div>

  <script>
    // Список предметов по умолчанию
    let items = ["Чашка", "Ключи", "Телефон", "Ручка", "Монета"];

    const errorEl = document.getElementById('error');
    let redirected = false;

    function getViewerSlug() {
      const path = window.location.pathname;
      const parts = path.split('/').filter(Boolean);
      if (parts[0] === 'u') return parts[1] || 'default';
      if (parts.length === 1) return parts[0];
      return 'default';
    }

    const viewerSlug = getViewerSlug();

    function redirectToItem(index) {
      if (redirected) return;
      redirected = true;

      const name = items[index] || items[0];
      const url = `https://www.google.com/search?q=${encodeURIComponent(name)}&tbm=isch`;

      // Важно: replace, чтобы нельзя было вернуться назад
      window.location.replace(url);
    }

    async function loadItems() {
      try {
        const res = await fetch(`/api/u/${viewerSlug}/getItems`, { cache: 'no-store' });
        if (!res.ok) throw new Error('Не удалось получить список');
        const data = await res.json();
        if (Array.isArray(data.items) && data.items.length >= 1) {
          items = data.items.map((v, i) => String(v || items[i] || '').trim()).filter(Boolean);
          if (items.length === 0) items = ["Чашка"];
        }
      } catch (err) {
        // Ошибка сети — остаёмся на дефолтном списке
      }
    }

    async function poll() {
      try {
        const res = await fetch(`/api/u/${viewerSlug}/getItem`, { cache: 'no-store' });
        if (!res.ok) throw new Error('Сервер недоступен');
        const data = await res.json();

        if (typeof data.item === 'number' && data.item >= 1) {
          // Перед редиректом подтягиваем свежие предметы, чтобы не было устаревших названий
          await loadItems();
          const max = Math.max(1, items.length);
          const index = Math.min(max, data.item) - 1;
          clearInterval(pollTimer);
          if (timeoutTimer) clearTimeout(timeoutTimer);
          redirectToItem(index);
        }
        errorEl.textContent = '';
        resetTimeout();
      } catch (err) {
        // Ошибка сети — просто показываем текст, но продолжаем опрос
        errorEl.textContent = 'Проблема с сетью, продолжаю ждать...';
      }
    }

    // Опрос каждые 500 мс
    const pollTimer = setInterval(poll, 500);

    // Таймаут 30 секунд — уходим на первый предмет.
    // Сбрасываем таймер при любом успешном ответе сервера,
    // чтобы редирект не происходил, пока фокусник активно работает.
    let timeoutTimer = null;
    function resetTimeout() {
      if (timeoutTimer) clearTimeout(timeoutTimer);
      timeoutTimer = setTimeout(() => {
        clearInterval(pollTimer);
        redirectToItem(0);
      }, 30000);
    }

    // Первый вызов сразу, чтобы не ждать 500 мс
    resetTimeout();
    loadItems().then(poll);
  </script>
</body>
</html>
