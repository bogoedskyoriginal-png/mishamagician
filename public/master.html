<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тишина</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600&display=swap');
    :root {
      --panel: rgba(24, 19, 17, 0.92);
      --panel-2: rgba(31, 24, 22, 0.9);
      --text: #f4f1eb;
      --muted: #b0a79b;
      --line: rgba(198, 163, 106, 0.22);
      --danger: #ffb3b3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(900px 520px at 20% -10%, #2b211c 0%, transparent 60%),
        radial-gradient(800px 420px at 100% 120%, #261d1a 0%, transparent 60%),
        #0f0c0b;
      color: var(--text);
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      padding: 18px;
      letter-spacing: 0.2px;
    }
    button, input, .tab, .pill { transition: all 160ms ease; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.8px;
      font-family: "Cormorant Garamond", serif;
    }
    .pill {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: var(--panel);
      backdrop-filter: blur(6px);
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 14px;
    }
    .tab.active {
      background: #2a201b;
      border-color: rgba(198, 163, 106, 0.45);
      box-shadow: inset 0 0 0 1px rgba(198, 163, 106, 0.18);
    }
    .row { margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(12, 17, 26, 0.9);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: rgba(198, 163, 106, 0.55);
      box-shadow: 0 0 0 3px rgba(198, 163, 106, 0.15);
    }
    button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #2a201b;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .muted { color: var(--muted); font-size: 12px; }
    .error { color: var(--danger); font-size: 12px; min-height: 14px; }
    .toolbar {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 8px;
    }
    .user {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      margin-top: 8px;
    }
    .links { display: grid; gap: 6px; margin-top: 6px; }
    .link-row {
      display: grid;
      gap: 6px;
      grid-template-columns: 1fr auto;
      align-items: center;
    }
    .copy-btn {
      padding: 6px 10px;
      border-radius: 10px;
      background: #2a201b;
      font-size: 12px;
      width: auto;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Тишина</h1>
    <div class="pill" id="sessionPill">Гость</div>
  </header>

  <div class="grid">
    <div class="card" id="loginCard">
      <div class="row"><input id="loginUser" placeholder="Логин" /></div>
      <div class="row"><input id="loginPass" type="password" placeholder="Пароль" /></div>
      <button id="loginBtn">Войти</button>
      <div class="error" id="loginError"></div>
    </div>

    <div class="card" id="appCard" style="display:none;">
      <div class="tabs" id="tabs">
        <button class="tab active" id="tabUsers">Пользователи</button>
        <button class="tab" id="tabCreate">Создать</button>
      </div>

      <div id="listView">
        <div class="toolbar">
          <input id="searchInput" placeholder="Поиск по slug" />
          <button id="refreshBtn">Обновить</button>
        </div>
        <div id="users"></div>
      </div>

      <div id="createView" style="display:none;">
        <div class="muted">Slug: латиница, цифры, -, _ (3–32 символа)</div>
        <input id="viewerSlug" placeholder="Viewer slug (например: alex)" />
        <input id="adminSlug" placeholder="Admin slug (например: alex-admin)" />
        <div class="toolbar">
          <button id="generateBtn">Сгенерировать</button>
          <button id="createBtn">Создать</button>
        </div>
        <div class="error" id="createError"></div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    const loginCard = document.getElementById('loginCard');
    const appCard = document.getElementById('appCard');
    const sessionPill = document.getElementById('sessionPill');

    const tabUsers = document.getElementById('tabUsers');
    const tabCreate = document.getElementById('tabCreate');
    const listView = document.getElementById('listView');
    const createView = document.getElementById('createView');

    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    const viewerSlug = document.getElementById('viewerSlug');
    const adminSlug = document.getElementById('adminSlug');
    const generateBtn = document.getElementById('generateBtn');
    const createBtn = document.getElementById('createBtn');
    const createError = document.getElementById('createError');

    const usersEl = document.getElementById('users');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusEl = document.getElementById('status');

    let cachedUsers = [];

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function showApp() {
      loginCard.style.display = 'none';
      appCard.style.display = 'block';
      sessionPill.textContent = 'Сессия активна';
    }

    function switchToCreate() {
      listView.style.display = 'none';
      createView.style.display = 'block';
      tabUsers.classList.remove('active');
      tabCreate.classList.add('active');
    }

    function switchToUsers() {
      listView.style.display = 'block';
      createView.style.display = 'none';
      tabUsers.classList.add('active');
      tabCreate.classList.remove('active');
    }

    function renderUsers(list) {
      const origin = window.location.origin;
      usersEl.innerHTML = '';
      list.forEach(u => {
        const div = document.createElement('div');
        div.className = 'user';
        div.innerHTML = `
          <div><b>${u.id}</b></div>
          <div class="links">
            <div class="link-row">
              <div class="muted">${origin}/u/${u.viewerSlug}</div>
              <button class="copy-btn" data-copy="${origin}/u/${u.viewerSlug}">Копировать</button>
            </div>
            <div class="link-row">
              <div class="muted">${origin}/a/${u.adminSlug}</div>
              <button class="copy-btn" data-copy="${origin}/a/${u.adminSlug}">Копировать</button>
            </div>
          </div>
        `;
        usersEl.appendChild(div);
      });
    }

    function applySearch() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderUsers(cachedUsers);
      renderUsers(cachedUsers.filter(u =>
        u.viewerSlug.toLowerCase().includes(q) || u.adminSlug.toLowerCase().includes(q)
      ));
    }

    async function loadUsers() {
      setStatus('Загружаю список...');
      const res = await fetch('/api/master/list-users');
      if (!res.ok) {
        setStatus('Не удалось загрузить список');
        return;
      }
      const data = await res.json();
      if (!data.ok) {
        setStatus('Не удалось загрузить список');
        return;
      }
      cachedUsers = data.users || [];
      applySearch();
      setStatus(`Пользователей: ${cachedUsers.length}`);
    }

    async function doLogin() {
      loginError.textContent = '';
      const res = await fetch('/api/master/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: loginUser.value.trim(),
          password: loginPass.value
        })
      });
      if (!res.ok) {
        loginError.textContent = 'Неверный логин или пароль';
        return;
      }
      showApp();
      switchToUsers();
      await loadUsers();
    }

    function randomSlug(base) {
      const tail = Math.random().toString(36).slice(2, 6);
      return `${base}-${tail}`;
    }

    async function createUser() {
      createError.textContent = '';
      const res = await fetch('/api/master/create-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          viewerSlug: viewerSlug.value.trim(),
          adminSlug: adminSlug.value.trim()
        })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        createError.textContent = (data && data.error) ? data.error : 'Ошибка';
        return;
      }
      viewerSlug.value = '';
      adminSlug.value = '';
      switchToUsers();
      await loadUsers();
    }

    usersEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      const text = btn.getAttribute('data-copy');
      try {
        await navigator.clipboard.writeText(text);
        setStatus('Ссылка скопирована');
      } catch (err) {
        setStatus('Не удалось скопировать');
      }
    });

    loginBtn.addEventListener('click', doLogin);
    loginPass.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    createBtn.addEventListener('click', createUser);
    generateBtn.addEventListener('click', () => {
      const base = viewerSlug.value.trim() || 'user';
      viewerSlug.value = randomSlug(base);
      adminSlug.value = randomSlug(base + '-admin');
    });

    tabCreate.addEventListener('click', switchToCreate);
    tabUsers.addEventListener('click', switchToUsers);
    refreshBtn.addEventListener('click', loadUsers);
    searchInput.addEventListener('input', applySearch);

    // Пробуем авто-вход по cookie
    (async () => {
      const res = await fetch('/api/master/list-users');
      if (res.ok) {
        showApp();
        switchToUsers();
        await loadUsers();
      }
    })();
  </script>
</body>
</html>
